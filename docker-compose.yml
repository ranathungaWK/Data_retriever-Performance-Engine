# Requires a .env next to this file (see app/core/config.py).
# POSTGRES_USER, POSTGRES_PASSWORD, POSTGRES_DB configure the postgres service.
# DATABASE_URL in .env should use localhost when the app runs on your machine (Mac/Windows/Linux);
# the api service overrides DATABASE_URL to use hostname "postgres" on the Docker network.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-TestTrigger}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-postgres}", "-d", "${POSTGRES_DB:-TestTrigger}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-TestTrigger}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
